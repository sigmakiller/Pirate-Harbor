name: Release

on:
  push:
    tags:
      - 'v*.*.*'   # triggers on v0.1.0, v0.2.0, etc.

permissions:
  contents: write   # needed to create GitHub Releases and upload assets

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: pnpm install

      - name: Build Tauri app
        working-directory: apps/desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      # ── Extract version from tag ────────────────────────────────────────────
      - name: Extract version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # ── Update releases/latest.json ─────────────────────────────────────────
      - name: Update releases/latest.json
        shell: pwsh
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          NOTES: ${{ github.event.head_commit.message }}
        run: |
          $sig = Get-Content "apps/desktop/src-tauri/target/release/bundle/nsis/Pirate Harbor_${env:VERSION}_x64-setup.exe.sig" -Raw -ErrorAction SilentlyContinue
          if (-not $sig) { $sig = "" }
          $manifest = @{
            version  = $env:VERSION
            notes    = $env:NOTES
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = @{
              "windows-x86_64" = @{
                signature = $sig.Trim()
                url       = "https://github.com/sigmakiller/Pirate-Harbor/releases/download/v${env:VERSION}/Pirate-Harbor_${env:VERSION}_x64-setup.exe"
              }
            }
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content "releases/latest.json" -Encoding UTF8
          Write-Host "Updated releases/latest.json for v${env:VERSION}"

      # ── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Pirate Harbor ${{ github.ref_name }}
          body_path: releases/latest.json
          files: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe.sig
            releases/latest.json
